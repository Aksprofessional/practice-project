{% extends "base.html" %}

{% block content %}

<h1>Signup</h1>

<form method="POST">

    {% csrf_token %}

    <input type="text"
           name="username"
           placeholder="Username">

    <input type="password"
           name="password"
           placeholder="Password">

    <button type="submit">

        Signup

    </button>

</form>

{% endblock %}
